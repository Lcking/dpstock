services:
  app:
    build: .
    container_name: stock-scanner-app
    restart: unless-stopped
    # autoheal 容器会监听这个 label：健康检查失败时自动 docker restart 本容器
    # 用于解决"网站活着但诊股链路静默挂死"的月度复发问题
    labels:
      - autoheal=true
    environment:
      - API_TYPE=${API_TYPE}
      - API_KEY=${API_KEY}
      - API_URL=${API_URL}
      - API_MODEL=${API_MODEL}
      - API_TIMEOUT=${API_TIMEOUT}
      - TUSHARE_TOKEN=${TUSHARE_TOKEN}
      - JUMDATA_APP_CODE=${JUMDATA_APP_CODE}
      - ANNOUNCEMENT_TEXT=${ANNOUNCEMENT_TEXT}
      - LOGIN_PASSWORD=${LOGIN_PASSWORD}
      # 管理后台 /admin：与站内用户 JWT 独立，见 auth/admin_auth.py
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - ADMIN_JWT_EXPIRE_HOURS=${ADMIN_JWT_EXPIRE_HOURS:-8}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - SEND_REAL_EMAIL=${SEND_REAL_EMAIL:-true}
      - FROM_EMAIL=${FROM_EMAIL:-Aguai <noreply@aguai.net>}
      - STREAM=${STREAM:-true}
      - DB_PATH=/app/data/stocks.db
    volumes:
      # IMPORTANT: persist SQLite DB outside container
      # You can override with DATA_DIR=/var/lib/aguai/data
      - ${DATA_DIR:-./data}:/app/data
      - ./logs:/app/logs
    networks:
      - stock-scanner-network
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8888/api/health', timeout=5).read()" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:stable-alpine
    container_name: stock-scanner-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    networks:
      - stock-scanner-network
    depends_on:
      - app
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  certbot:
    image: certbot/certbot:latest
    container_name: stock-scanner-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/www:/var/www/certbot:rw
      - ./certbot/conf:/etc/letsencrypt:rw
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"

  # Watchdog：监听带 autoheal=true label 的容器，healthcheck 持续 unhealthy 就自动 docker restart
  # 这是 docker compose 里实现"健康检查失败自动重启"的标准做法（compose 自身不会因 healthcheck 失败重启）
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: stock-scanner-autoheal
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=60
      - DOCKER_SOCK=/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

networks:
  stock-scanner-network:
    driver: bridge
