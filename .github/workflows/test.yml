name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run core regression suite
        run: |
          python -m pytest \
            tests/test_instrument_resolver.py \
            tests/test_etf_article_names.py \
            tests/test_analyze_quota_and_limit.py \
            tests/test_judgment_verifier.py \
            tests/test_seo_injection.py \
            tests/test_risk_stock_frontend_contract.py \
            tests/test_risk_alert_email.py \
            -q --tb=short
